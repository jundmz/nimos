# ╔══════════════════════════════════════════════════════════════╗
# ║                    EFFICIENT TMUX CONFIG                    ║
# ╚══════════════════════════════════════════════════════════════╝

# ── General ───────────────────────────────────────────────────
set  -g default-terminal "tmux-256color"
set  -ag terminal-overrides ",xterm-256color:RGB"
set  -g history-limit 50000
set  -g buffer-limit 20
set  -sg escape-time 0                  # No delay on Esc (critical for Vim)
set  -g focus-events on
set  -g set-clipboard on
set  -g display-time 1500
set  -g display-panes-time 800
setw -g aggressive-resize on            # Better multi-monitor support

# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix `                       # Ctrl-A is faster to reach
bind C-a send-prefix                    # Send literal C-a with double tap

# ── Reload Config ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Windows ───────────────────────────────────────────────────
set  -g base-index 1                    # Start numbering at 1
setw -g pane-base-index 1
set  -g renumber-windows on             # Renumber on close
setw -g automatic-rename on

bind c new-window -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"   # Alt-t: new window
bind -n M-1 select-window -t 1          # Alt-1..9: jump to window
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Splits ────────────────────────────────────────────────────
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation (Vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + hjkl — navigate without prefix (fastest)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane Resizing ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Swap Panes ────────────────────────────────────────────────
bind > swap-pane -D
bind < swap-pane -U

# ── Copy Mode (Vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "xclip -sel clip || pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind p paste-buffer

# ── Mouse ─────────────────────────────────────────────────────
set -g mouse on

# ── Session Management ────────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session
bind -n M-s choose-tree -s             # Alt-s: session picker

# ── Quick Actions ─────────────────────────────────────────────
bind -n M-f resize-pane -Z                  # Toggle zoom
bind x kill-pane                       # Kill pane (no confirm)
bind X kill-window                     # Kill window
bind b break-pane                      # Break pane to window
bind m command-prompt -p "Send pane to:" "join-pane -t '%%'"

# ── Status Bar ────────────────────────────────────────────────
set  -g status on
set  -g status-interval 5
set  -g status-position bottom
set  -g status-justify left
set  -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session name
set  -g status-left-length 30
set  -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26] "

# Window tabs
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26]"

# Right: host + time
set  -g status-right-length 50
set  -g status-right "#[fg=#565f89] %H:%M #[fg=#1a1b26,bg=#7aa2f7,bold] #H "

# ── Pane Borders ──────────────────────────────────────────────
set  -g pane-border-style "fg=#3b4261"
set  -g pane-active-border-style "fg=#7aa2f7"

# ── Messages ──────────────────────────────────────────────────
set  -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"

# ─── Shell & History ──────────────────────────────────
set -g history-file ~/.tmux_history          # persist : prompt history across restarts
set -g default-command "${SHELL}"            # non-login shell (avoid double-sourcing profile)

# ─── Window Navigation ───────────────────────────────
bind Tab   last-window                       # prefix-Tab  → last active window
bind -n M-[ previous-window                  # Alt-[       → prev window (no prefix)
bind -n M-] next-window                      # Alt-]       → next window (no prefix)
# bind f run-shell "tmux list-windows -aF '#{session_name}:#{window_name}' \
#   | fzf-tmux | xargs tmux switch-client -t"  # prefix-f    → fzf jump to any window

# ─── Session Navigation ──────────────────────────────
bind ` switch-client -l                      # prefix-`    → last active session

# ─── Pane Management ─────────────────────────────────
bind M   select-pane -m                      # prefix-M    → mark current pane
bind C-m swap-pane                           # prefix-C-m  → swap marked ↔ current pane
bind C-s set synchronize-panes \; \
  display "Sync #{?synchronize-panes,ON,OFF}" # prefix-C-s → toggle sync typing to all panes

# ─── Scrollback & Search ─────────────────────────────
bind / copy-mode \; send-keys ?              # prefix-/    → jump straight into search

# ─── Logging ─────────────────────────────────────────
bind P pipe-pane -o "cat >> ~/tmux_log_#W.txt" \; \
  display "Logging toggled"                  # prefix-P    → toggle pane output to file

# === Popup window shortcuts ===

### Alt-P

bind-key -n -N 'Toggle popup window' M-p if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 75% -E 'tmux attach-session -t scratch || tmux new-session -s scratch'
}

### Alt-S

bind-key -n -N 'Toggle popup window' M-s if-shell -F '#{==:#{session_name},popup}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 75% -E 'tmux attach-session -t popup || tmux new-session -s popup'
}



# & to select pane and maximaize window 
bind & run-shell "tmux resizep; tmux display-panes; tmux resizep -Z"

# same above but doen't maximaize 
# bind ; run-shell "tmux resizep; tmux display-panes"

# select session/window/pane by name 
bind -n M-o run-shell "tmux choose-tree; tmux send-keys '/';"
